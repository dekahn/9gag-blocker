<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 300px;
            background: #1a1a1a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 13px;
        }
        
        .popup-container {
            padding: 15px;
            max-height: 600px;
            overflow-y: auto;
        }
        
        h2 {
            font-size: 14px;
            margin-bottom: 12px;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
            color: #aaa;
            font-weight: bold;
        }
        
        .input-section {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }
        
        .input-group {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        
        #tag-input {
            flex: 1;
            background: #262626;
            border: 1px solid #3c3c3c;
            color: #fff;
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 12px;
            outline: none;
        }
        
        #tag-input:focus {
            border-color: #555;
        }
        
        #tag-input::placeholder {
            color: #666;
        }
        
        .add-btn, .action-btn {
            background: #262626;
            border: 1px solid #3c3c3c;
            color: #aaa;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .add-btn:hover, .action-btn:hover {
            background: #333;
            color: #fff;
            border-color: #555;
        }
        
        .add-btn:active, .action-btn:active {
            background: #1a1a1a;
        }
        
        .actions-section {
            display: flex;
            gap: 6px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }
        
        .action-btn {
            flex: 1;
            padding: 6px 8px;
            font-size: 11px;
        }
        
        #blocked-list {
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        
        .tag-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #262626;
            padding: 8px;
            margin-bottom: 6px;
            border-radius: 4px;
            border: 1px solid #3c3c3c;
        }
        
        .tag-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #ddd;
            font-size: 12px;
        }
        
        .remove-btn {
            color: #ff5c5c;
            cursor: pointer;
            font-weight: bold;
            margin-left: 8px;
            user-select: none;
            font-size: 14px;
        }
        
        .remove-btn:hover {
            color: #ff7f7f;
        }
        
        .empty-state {
            color: #666;
            font-size: 12px;
            font-style: italic;
            text-align: center;
            padding: 20px 10px;
        }
        
        .stats {
            background: #262626;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #3c3c3c;
            text-align: center;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 10px;
        }

        .footer {
            border-top: 1px solid #333;
            padding-top: 10px;
            text-align: center;
        }

        .help-link {
            color: #888;
            text-decoration: none;
            font-size: 11px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .help-link:hover {
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="popup-container">
        <h2>🚫 Blocked Tags</h2>
        
        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="tag-input" 
                    placeholder="Add a tag to filter..."
                >
                <button class="add-btn" id="add-btn">Add</button>
            </div>
        </div>

        <div class="actions-section">
            <button class="action-btn" id="export-btn">📥 Export</button>
            <button class="action-btn" id="import-btn">📤 Import</button>
        </div>
        
        <div id="blocked-list"></div>
        <div class="stats" id="stats"></div>

        <div class="footer">
            <a class="help-link" id="help-link">ℹ️ How it works</a>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
